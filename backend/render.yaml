# Render Blueprint for the Jobify Spring Boot backend.
# In Render: New + → Blueprint → pick this repo. (Or deploy manually — see DEPLOY-RENDER.md.)
# Set the secret env vars (sync:false) in the dashboard after the first deploy.
services:
  - type: web
    name: jobify-backend
    runtime: docker
    rootDir: backend          # this service lives in the /backend folder of the monorepo
    dockerfilePath: ./Dockerfile
    plan: free                # free tier sleeps after ~15 min idle (cold start on next hit)
    region: oregon            # change if you prefer (singapore, frankfurt, etc.)
    envVars:
      - key: SPRING_DATA_MONGODB_URI   # MongoDB Atlas connection string
        sync: false
      - key: MAIL_USERNAME             # Gmail address used to send OTP
        sync: false
      - key: MAIL_PASSWORD             # Gmail App Password (NOT your account password)
        sync: false
      - key: JWT_SECRET                # long random string used to sign JWTs
        generateValue: true            # let Render generate a secure random value
